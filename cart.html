<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart | Audience Ka Brand</title>

<link rel="icon" href="favicon.png">
<link rel="shortcut icon" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#D4AF37;
  --gold-light:#F5D76E;
  --black:#0B0B0B;
  --card:#161616;
  --border:rgba(255,255,255,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:var(--black);
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

img{
  display:block;
  max-width:100%;
  pointer-events:none;
  -webkit-user-drag:none;
  user-select:none;
}

a{
  text-decoration:none;
  color:inherit;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:50px 8%;
}

/* HEADER */
header{
  background:#111;
  padding:16px 8%;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid rgba(212,175,55,.2);
  backdrop-filter:blur(10px);
}

.header-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}

.logo{
  font-size:24px;
  font-weight:800;
  color:var(--gold);
  white-space:nowrap;
}

.header-links{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.header-pill{
  padding:10px 16px;
  border-radius:999px;
  background:#1b1b1b;
  border:1px solid rgba(255,255,255,.08);
  font-weight:700;
  color:#fff;
}

.header-pill.highlight{
  background:var(--gold);
  color:#111;
}

/* PAGE TITLE */
.page-title{
  font-size:clamp(2rem,4vw,3rem);
  color:var(--gold);
  margin-bottom:10px;
  text-align:center;
}

.page-subtitle{
  text-align:center;
  color:#bdbdbd;
  margin-bottom:40px;
  line-height:1.7;
}

/* LAYOUT */
.cart-layout{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:30px;
  align-items:start;
}

.cart-items{
  background:var(--card);
  border-radius:22px;
  padding:24px;
  border:1px solid var(--border);
}

.cart-item{
  display:grid;
  grid-template-columns:120px 1fr auto;
  gap:18px;
  align-items:center;
  padding:20px 0;
  border-bottom:1px solid var(--border);
}

.cart-item:last-child{
  border-bottom:none;
  padding-bottom:0;
}

.cart-item img{
  width:120px;
  height:150px;
  border-radius:16px;
  object-fit:cover;
}

.item-name{
  font-size:1.2rem;
  font-weight:700;
  margin-bottom:8px;
}

.item-meta{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:10px;
}

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 12px;
  border-radius:999px;
  background:#111;
  border:1px solid rgba(255,255,255,.08);
  color:#ddd;
  font-size:.85rem;
  font-weight:700;
}

.item-price{
  color:var(--gold);
  font-size:1.2rem;
  font-weight:800;
}

.qty-box{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

.qty-box label{
  color:#cfcfcf;
  font-weight:600;
}

.qty-box input{
  width:84px;
  padding:10px;
  background:#111;
  border:1px solid #333;
  color:white;
  border-radius:10px;
  outline:none;
}

.qty-box input:focus{
  border-color:var(--gold);
}

.remove-btn{
  background:#8b1d1d;
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  transition:.2s ease;
  height:fit-content;
}

.remove-btn:hover{
  transform:translateY(-1px);
  background:#a11f1f;
}

/* SUMMARY */
.summary{
  background:var(--card);
  padding:24px;
  border-radius:22px;
  border:1px solid var(--border);
  height:fit-content;
  position:sticky;
  top:110px;
}

.summary h2{
  color:var(--gold);
  margin-bottom:18px;
  font-size:1.6rem;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  margin:14px 0;
  color:#e7e7e7;
}

.total{
  font-size:1.4rem;
  font-weight:800;
  color:var(--gold-light);
}

.checkout-btn{
  display:block;
  width:100%;
  margin-top:22px;
  padding:16px;
  background:var(--gold);
  color:black;
  font-weight:800;
  text-align:center;
  border-radius:14px;
  transition:.2s ease;
}

.checkout-btn:hover{
  transform:translateY(-1px);
}

.empty-cart{
  text-align:center;
  padding:56px 20px;
  color:#aaa;
  border:1px dashed rgba(255,255,255,.15);
  border-radius:18px;
  background:rgba(255,255,255,.02);
}

.empty-cart h3{
  color:#fff;
  margin-bottom:10px;
}

.empty-cart p{
  line-height:1.8;
  margin-bottom:20px;
}

.back-btn{
  display:inline-block;
  margin-bottom:22px;
  color:var(--gold);
  text-decoration:none;
  font-weight:700;
}

footer{
  text-align:center;
  padding:40px 8%;
  margin-top:50px;
  border-top:1px solid rgba(255,255,255,.08);
  color:var(--gold);
}

/* RESPONSIVE */
@media(max-width:900px){
  .cart-layout{
    grid-template-columns:1fr;
  }

  .summary{
    position:static;
  }

  .cart-item{
    grid-template-columns:1fr;
    justify-items:start;
  }

  .cart-item img{
    width:100%;
    height:280px;
    max-width:280px;
  }

  .header-row{
    flex-direction:column;
    align-items:flex-start;
  }

  .header-links{
    width:100%;
    justify-content:flex-start;
  }
}

@media(max-width:640px){
  .container{
    padding:28px 5%;
  }

  header{
    padding:14px 5%;
  }

  .logo{
    font-size:20px;
  }

  .page-title{
    font-size:2rem;
  }

  .page-subtitle{
    font-size:.95rem;
  }

  .cart-items,
  .summary{
    padding:18px;
  }

  .item-name{
    font-size:1.05rem;
  }

  .item-price{
    font-size:1.05rem;
  }

  .checkout-btn{
    padding:15px;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-row">
    <div class="logo">🎬 Audience Ka Brand</div>
    <div class="header-links">
      <a class="header-pill" href="shop.html">Shop</a>
      <a class="header-pill" href="track-order.html">Track</a>
      <a class="header-pill highlight" href="checkout.html">Checkout</a>
    </div>
  </div>
</header>

<div class="container">

  <a href="index.html" class="back-btn">← Continue Shopping</a>

  <h1 class="page-title">🛒 Your Cart</h1>
  <p class="page-subtitle">Check your items, update quantity, and continue to checkout.</p>

  <div class="cart-layout">

    <div class="cart-items" id="cartItems">
      <!-- Cart items render here -->
    </div>

    <div class="summary">
      <h2>Order Summary</h2>

      <div class="summary-row">
        <span>Subtotal</span>
        <span id="subtotal">₹0</span>
      </div>

      <div class="summary-row">
        <span>Shipping</span>
        <span id="shipping">FREE</span>
      </div>

      <hr style="margin:15px 0;border-color:#333;">

      <div class="summary-row total">
        <span>Total</span>
        <span id="total">₹0</span>
      </div>

      <a href="checkout.html" class="checkout-btn" id="checkoutBtn">Proceed To Checkout</a>
    </div>

  </div>
</div>

<footer>
  AUDIENCE KA BRAND<br><br>
  Made By Movie Lovers, For Movie Lovers
</footer>

<script>
const CART_KEY = 'akb_cart';

function money(n){
  return '₹' + new Intl.NumberFormat('en-IN').format(Number(n || 0));
}

function loadCart(){
  try{
    return JSON.parse(localStorage.getItem(CART_KEY) || '[]');
  }catch{
    return [];
  }
}

function saveCart(cart){
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
}

function renderCart(){
  const cartItems = document.getElementById('cartItems');
  const subtotalEl = document.getElementById('subtotal');
  const totalEl = document.getElementById('total');
  const checkoutBtn = document.getElementById('checkoutBtn');

  const cart = loadCart();

  if(!cart.length){
    cartItems.innerHTML = `
      <div class="empty-cart">
        <h3>Your cart is empty</h3>
        <p>Go back to the shop and add your first Audience Ka Brand drop.</p>
        <a href="shop.html" class="checkout-btn" style="display:inline-block;width:auto;padding:14px 20px;">Browse Collection</a>
      </div>
    `;
    subtotalEl.textContent = money(0);
    totalEl.textContent = money(0);
    checkoutBtn.style.display = 'none';
    return;
  }

  checkoutBtn.style.display = 'block';

  let subtotal = 0;

  cartItems.innerHTML = cart.map((item, index) => {
    const lineTotal = Number(item.price) * Number(item.quantity);
    subtotal += lineTotal;

    return `
      <div class="cart-item">
        <img src="${item.image}" alt="${item.name}">
        <div class="item-info">
          <div class="item-name">${item.name}</div>

          <div class="item-meta">
            <span class="badge">Size: ${item.size || 'L'}</span>
            <span class="badge">₹${Number(item.price).toLocaleString('en-IN')}</span>
          </div>

          <div class="item-price">${money(lineTotal)}</div>

          <div class="qty-box">
            <label for="qty-${index}">Qty:</label>
            <input
              type="number"
              id="qty-${index}"
              min="1"
              value="${item.quantity}"
              data-index="${index}"
              class="qty-input"
            >
          </div>
        </div>

        <button class="remove-btn" data-remove="${index}">Remove</button>
      </div>
    `;
  }).join('');

  subtotalEl.textContent = money(subtotal);
  totalEl.textContent = money(subtotal);

  document.querySelectorAll('.qty-input').forEach(input => {
    input.addEventListener('input', function(){
      const index = Number(this.dataset.index);
      const value = Math.max(1, parseInt(this.value) || 1);
      const cart = loadCart();
      cart[index].quantity = value;
      saveCart(cart);
      renderCart();
    });
  });

  document.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', function(){
      const index = Number(this.dataset.remove);
      const cart = loadCart();
      cart.splice(index, 1);
      saveCart(cart);
      renderCart();
    });
  });
}

/* Disable Right Click */
document.addEventListener('contextmenu', e => e.preventDefault());

/* Disable Drag */
document.addEventListener('dragstart', e => e.preventDefault());

/* Disable Selection */
document.addEventListener('selectstart', e => e.preventDefault());

/* Disable Save Source */
document.addEventListener('keydown', function(e){
  if(
    (e.ctrlKey && (e.key === 's' || e.key === 'u')) ||
    e.key === 'F12'
  ){
    e.preventDefault();
  }
});

renderCart();
</script>

</body>
</html>
