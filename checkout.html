<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Audience Ka Brand</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--gold:#D4AF37;
--gold-light:#F5D76E;
--black:#0B0B0B;
--card:#161616;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--black);
color:white;
}

header{
background:#111;
padding:20px 8%;
border-bottom:1px solid rgba(212,175,55,.2);
}

.logo{
font-size:28px;
font-weight:800;
color:var(--gold);
}

.container{
max-width:1200px;
margin:auto;
padding:50px 8%;
}

.page-title{
font-size:3rem;
color:var(--gold);
text-align:center;
margin-bottom:40px;
}

.checkout-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.card{
background:var(--card);
padding:30px;
border-radius:20px;
}

.card h2{
color:var(--gold);
margin-bottom:25px;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.form-group input,
.form-group textarea{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #333;
background:#0B0B0B;
color:white;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.order-row{
display:flex;
justify-content:space-between;
margin:15px 0;
}

.total{
font-size:1.4rem;
font-weight:700;
color:var(--gold-light);
}

.qr-box{
text-align:center;
}

.qr-box img{
width:280px;
max-width:100%;
border-radius:20px;
margin:20px auto;
display:block;
pointer-events:none;
user-select:none;
-webkit-user-drag:none;
}

.place-order{
width:100%;
padding:18px;
background:var(--gold);
border:none;
border-radius:12px;
font-size:18px;
font-weight:700;
cursor:pointer;
margin-top:25px;
}

.back-btn{
display:inline-block;
margin-bottom:30px;
color:var(--gold);
text-decoration:none;
}

@media(max-width:900px){

.checkout-grid{
grid-template-columns:1fr;
}

.row{
grid-template-columns:1fr;
}

.page-title{
font-size:2rem;
}

}

</style>
</head>

<body>

<header>
<div class="logo">🎬 Audience Ka Brand</div>
</header>

<div class="container">

<a href="cart.html" class="back-btn">
← Back To Cart
</a>

<h1 class="page-title">
🎟 Checkout
</h1>

<div class="checkout-grid">

<div class="card">

<h2>Customer Information</h2>

<div class="form-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="row">

<div class="form-group">
<label>Email</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" required>
</div>

</div>

<h2>Shipping Address</h2>

<div class="form-group">
<label>Address Line 1</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Address Line 2</label>
<input type="text">
</div>

<div class="row">

<div class="form-group">
<label>City</label>
<input type="text" required>
</div>

<div class="form-group">
<label>State</label>
<input type="text" required>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Pincode</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Country</label>
<input type="text" value="India">
</div>

</div>

<div class="form-group">
<label>Order Notes</label>
<textarea rows="4"></textarea>
</div>

</div>

<div>

<div class="card">

<h2>Order Summary</h2>

<div class="order-row">
<span>See You At The Movies</span>
<span>₹999</span>
</div>

<hr style="border-color:#333;margin:15px 0;">

<div class="order-row total">
<span>Total</span>
<span>₹999</span>
</div>

</div>

<div class="card" style="margin-top:20px;">

<h2>Scan & Pay</h2>

<div class="qr-box">

<img src="qrcode.png" alt="UPI QR">

<p>
UPI ID:
<strong>
mihirpatel4515-1@okaxis
</strong>
</p>

</div>

<div class="form-group">
<label>Transaction ID</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Upload Payment Screenshot</label>
<input type="file" accept="image/*">
</div>

<button
class="place-order"
onclick="placeOrder()">

Place Order

</button>

</div>

</div>

</div>

</div>

<script>

function placeOrder(){

alert(
'Order Placed Successfully!'
);

window.location.href =
'order-success.html';

}

document.addEventListener(
'contextmenu',
e=>e.preventDefault()
);

document.addEventListener(
'dragstart',
e=>e.preventDefault()
);

document.addEventListener(
'selectstart',
e=>e.preventDefault()
);

</script>

</body>
</html>
